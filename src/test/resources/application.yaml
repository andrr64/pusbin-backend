spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
server:
  port: ${SERVER_PORT:8080}
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_TOKEN_EXPIRY_MS:259200000}
iam:
  rate-limit:
    login:
      max-attempts: ${IAM_LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${IAM_LOGIN_WINDOW_SECONDS:60}
    register:
      max-attempts: ${IAM_REGISTER_MAX_ATTEMPTS:3}
      window-seconds: ${IAM_REGISTER_WINDOW_SECONDS:60}
